<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards - IdiomKu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <!-- Header banner with Back button and Logo -->
  <div class="header-banner">
    <div class="container d-flex justify-content-between align-items-center">
      <button class="back-button" onclick="goBack()">← Back</button>
      <img src="images/logo.png" alt="IdiomKu Logo" style="height: 40px;">
    </div>
  </div>

  <div class="container mt-5">
    <h1 class="text-center" id="category-title">Flashcards</h1>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card text-center mb-3">
          <div class="card-body">
            <h5 class="card-title" id="idiom-text">Click to Start</h5>
            <p class="card-text d-none" id="translation-text">Translation will appear here.</p>
            <button class="btn btn-primary" onclick="flipCard()">Flip</button>
          </div>
        </div>
        <div class="text-center">
          <button class="btn btn-secondary" onclick="previousCard()">← Previous</button>
          <button class="btn btn-secondary" onclick="nextCard()">Next →</button>
        </div>
        <!-- Instructional text -->
        <p class="instruction-text text-center mt-3">
          Press <strong>Space</strong> to flip the card. Use <strong>←</strong> and <strong>→</strong> to navigate.
        </p>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
