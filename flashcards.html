<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards - IdiomKu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center" id="category-title">Flashcards</h1>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <!-- Flashcard -->
        <div class="card" id="flashcard">
          <div class="card-body">
            <!-- Front of the card -->
            <div class="card-front">
              <h5 class="card-title" id="idiom-text">Click to Start</h5>
            </div>
            <!-- Back of the card -->
            <div class="card-back">
              <p class="card-text" id="translation-text">Translation will appear here.</p>
            </div>
          </div>
        </div>
        <!-- Navigation buttons -->
        <div class="text-center mt-3">
          <button class="btn btn-secondary" onclick="previousCard()">← Previous</button>
          <button class="btn btn-secondary" onclick="nextCard()">Next →</button>
        </div>
        <!-- Instructional text -->
        <p class="instruction-text text-center mt-3">
          Press <strong>Space</strong> to flip the card. Use <strong>←</strong> and <strong>→</strong> to navigate.
        </p>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
