<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards - IdiomKu</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h1 class="text-center" id="category-title">Flashcards</h1>
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card text-center mb-3">
          <div class="card-body">
            <h5 class="card-title" id="idiom-text">Click to Start</h5>
            <p class="card-text d-none" id="translation-text">Translation will appear here.</p>
            <button class="btn btn-primary" onclick="flipCard()">Flip Card</button>
          </div>
        </div>
        <div class="text-center">
          <button class="btn btn-success" onclick="markRemembered()">Remembered</button>
          <button class="btn btn-warning" onclick="markReview()">Review Later</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
